<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <h1 id="title">Blackjack </h1>
        <h2 id="response-el">Want to play a round?</h2>
        <h2 id="dealercards-el">Dealer's Hand: </h2>
        <h2 id="dealersum-el">Dealer's Sum: </h2>
        <h2 id="cards-el">Cards: </h2>
        <h2 id="sum-el">Sum: </h2>
        <button onclick="draw()" id="draw-el">Start Game?</button>
        <button onclick="stand()" id="stand-el" style="display: none">Stand</button>
        <button onclick="replay()" id="replay-el" style="display: none">Replay?</button>
        <h2 id="money">Money: $100</h2>
        <h2 id="bet-amount">Current Bet: $10</h2>
        <input type="number" id="bet-input" placeholder="Enter your bet">
        <button onclick="bet()" id="bet-el">Bet</button>
        <button onclick="reload()" id="reload-el" style="display: none">
            <span>Admit Defeat and Start Over</span></button>
        <script src="index.js"></script>
    </head>
    <body></body>
</html>
